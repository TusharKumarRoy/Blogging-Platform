<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Details</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="blog-style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">OpenBlogs</div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <!-- Theme: category select remains; added theme toggle button at the end -->
            <ul class="nav-links nav-center">
                <li><a href="index.html">Home</a></li>
                <li class="nav-category">
                    <select id="category-select" aria-label="Filter by category">
                        <option value="All">All Categories</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="CSS & Design">CSS & Design</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Design">Design</option>
                        <option value="TypeScript">TypeScript</option>
                        <option value="Productivity">Productivity</option>
                        <option value="Accessibility">Accessibility</option>
                        <option value="Deployment">Deployment</option>
                    </select>
                </li>
                <li><a href="about.html">About</a></li>
                <!-- Theme Toggle Button (Light/Dark) -->
                <li class="theme-toggle"><button id="theme-toggle" aria-label="Toggle theme">🌙</button></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Blog Details Section -->
        <section class="blog-details" id="blog-details"></section>
        <!-- Related Blogs Section -->
        <section class="related-blogs-section">
            <h2 class="section-title">Blogs You May Like</h2>
            <div class="related-blogs" id="related-blogs"></div>
        </section>
    </main>

    <!-- Footer -->
        <footer class="footer mega-footer">
            <div class="footer-container">
                <div class="footer-col brand-col">
                    <div class="footer-logo">OpenBlogs</div>
                </div>
                <div class="footer-col">
                    <div class="footer-title">BLOG</div>
                    <a href="index.html">All Blogs</a>
                    <a href="#">Popular Posts</a>
                </div>
                <div class="footer-col">
                    <div class="footer-title">RESOURCES</div>
                    <a href="about.html">About</a>
                    <a href="#">Community</a>
                </div>
                <div class="footer-col">
                    <div class="footer-title">COMPANY</div>
                    <a href="#">Terms & Conditions</a>
                    <a href="#">Privacy Policy</a>

                </div>
            </div>
            <div class="footer-copyright">© 2025 OpenBlogs | All rights reserved.</div>
        </footer>
    <!-- Theme: include theme script to manage light/dark state -->
    <script src="theme.js"></script>
    <script src="blog-script.js"></script>
    <script>
        // Mobile menu toggle function
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
        
        // Close mobile menu when clicking on a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-links').classList.remove('active');
            });
        });

        // Category select -> navigate to index with filter
        (function(){
            const select = document.getElementById('category-select');
            if (!select) return;
            const params = new URLSearchParams(window.location.search);
            const current = params.get('category') || 'All';
            select.value = current;
            select.addEventListener('change', () => {
                const val = select.value;
                const url = new URL(window.location.origin + window.location.pathname.replace('blog.html','index.html'));
                if (val && val !== 'All') url.searchParams.set('category', val);
                window.location.href = url.toString();
            });
        })();
    </script>
</body>
</html>
