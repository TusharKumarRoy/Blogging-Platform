<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenBlogs - Home</title>
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">OpenBlogs</div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <!-- Theme: category select remains; added theme toggle button at the end -->
            <ul class="nav-links nav-center">
                <li><a href="index.html">Home</a></li>
                <li class="nav-category">
                    <select id="category-select" aria-label="Filter by category">
              <option value="All">All Categories</option>
              <option value="Frontend">Frontend</option>
              <option value="Backend">Backend</option>
              <option value="Devops">DevOps</option>
              <option value="Android">Android</option>
              <option value="IOS">IOS</option>
              <option value="Others">Others</option>
            </select>
                </li>
                <li><a href="about.html">About</a></li>
                <!-- Theme Toggle Button (Light/Dark) -->
                <li class="theme-toggle">
                    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <section class="blog-list" id="blog-list"></section>
    </main>

    <!-- Footer -->
    <footer class="footer mega-footer">
        <div class="footer-container">
            <div class="footer-col brand-col">
                <div class="footer-logo">OpenBlogs</div>
            </div>
            <div class="footer-col">
                <div class="footer-title">BLOG</div>
                <a href="blog.html">All Blogs</a>
                <a href="#">Popular Posts</a>
            </div>
            <div class="footer-col">
                <div class="footer-title">RESOURCES</div>
                <a href="about.html">About</a>
                <a href="#">Community</a>
            </div>
            <div class="footer-col">
                <div class="footer-title">COMPANY</div>
                <a href="#">Terms & Conditions</a>
                <a href="#">Privacy Policy</a>
                <a href="#">GitHub</a>
            </div>
        </div>
        <div class="footer-copyright">
            © 2025 OpenBlogs | All rights reserved.
        </div>
    </footer>
    <!-- Theme: include theme script to manage light/dark state -->
    <script src="theme.js"></script>
    <script src="script.js"></script>
    <script>
        // Mobile menu toggle function
        function toggleMenu() {
            const navLinks = document.querySelector(".nav-links");
            navLinks.classList.toggle("active");
        }

        // Close mobile menu when clicking on a link
        document.querySelectorAll(".nav-links a").forEach((link) => {
            link.addEventListener("click", () => {
                document.querySelector(".nav-links").classList.remove("active");
            });
        });
    </script>
</body>

</html>
